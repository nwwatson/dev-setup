# Unbind the `r` key command
unbind r

# Bind the `r` key to reload the tmux configuration
bind r source-file ~/.tmux.conf

# Unbind the current prefix
unbind C-b

# Set Ctrl+Space as the new prefix key
set-option -g prefix C-Space

# Bind Ctrl+Space to send the prefix key
bind-key C+Space send-prefix

# Set mouse support on
set -g mouse on

# Move to the left a pane
bind-key h select-pane -L
# Move down a pane
bind-key j select-pane -D
# Move up a pane
bind-key k select-pane -U
# Move to the right a pane
bind-key l select-pane -R

# Set the status position to the top
set-option -g status-position top

# Setup Tmux Plugin Manager (TPM) and plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#2.1.3'

# Catppuccin theme
# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
# For TPM, instead use `run ~/.tmux/plugins/tmux/catppuccin.tmux`

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"


## KEEP THIS LINE AT THE END OF THE FILE ##
run '~/.tmux/plugins/tpm/tpm' 